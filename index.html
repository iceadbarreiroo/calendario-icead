<!DOCTYPE html>
<html lang="pt-BR">

<head>

  <meta charset="utf-8" />

  <meta name="viewport"
        content="width=device-width, initial-scale=1" />

  <title>Calendário ICEAD</title>

  <!-- Biblioteca PDF -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

  <!-- Biblioteca Excel -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

  <!-- CSS -->
  <link rel="stylesheet" href="icead.css">

</head>

<body>

  <!-- TOPO -->
  <div id="topButtons">

    <button id="toggleDark">
      🌙 Modo Escuro
    </button>

    <button id="btnLogin">
      Entrar
    </button>

  </div>

  <!-- LOGO -->
  <header>

    <img class="logo"
         src="logo.PNG"
         alt="Logo ICEAD">

  </header>

  <!-- TÍTULO -->
  <h1>
    Calendário ICEAD -
    <span id="monthTitle"></span>
  </h1>

  <!-- NAVEGAÇÃO -->
  <div class="nav">

    <button id="prev">
      ◀️ Mês anterior
    </button>

    <button id="next">
      Próximo mês ▶️
    </button>

  </div>

  <!-- EXPORTAÇÃO -->
  <div class="export-buttons edit-only"
       style="display:none;">

    <button onclick="exportarPDF()">
      Exportar PDF
    </button>

    <button onclick="exportarExcel()">
      Exportar Excel
    </button>

    <button onclick="window.print()">
      Imprimir
    </button>

  </div>

  <!-- DIAS -->
  <div id="weekdays">

    <div>Dom</div>
    <div>Seg</div>
    <div>Ter</div>
    <div>Qua</div>
    <div>Qui</div>
    <div>Sex</div>
    <div>Sáb</div>

  </div>

  <!-- CALENDÁRIO -->
  <div id="calendar"></div>

  <!-- MODAL -->
  <div id="modalOverlay">

    <div id="modal">

      <h3 id="modalTitle">
        Editar / Adicionar Evento
      </h3>

      <!-- DATA -->
      <label>Data</label>

      <input id="modalDate"
             type="date" />

      <!-- TIPO -->
      <label>Tipo</label>

      <select id="modalType">

        <option value="Culto">
          Culto
        </option>

        <option value="EBD">
          EBD
        </option>

        <option value="Vigília">
          Vigília
        </option>

        <option value="Ensaio">
          Ensaio
        </option>

        <option value="Especial">
          Especial
        </option>

        <option value="Não teremos culto">
          Não teremos culto
        </option>

        <option value="Congregação">
          Congregação
        </option>

      </select>

      <!-- HORÁRIO -->
      <label>Horário</label>

      <input id="modalHorario"
             type="time" />

      <!-- ABERTURA -->
      <label>Abertura</label>

      <input id="modalAbertura"
             type="text"
             placeholder="Responsável" />

      <!-- LOUVOR -->
      <label>Direção do Louvor</label>

      <input id="modalLouvor"
             type="text"
             placeholder="Responsável" />

      <!-- PALAVRA -->
      <label>Palavra</label>

      <input id="modalPalavra"
             type="text"
             placeholder="Quem ministra" />

      <!-- BOTÕES -->
      <div class="modal-actions">

        <button class="btn btn-secondary"
                id="modalCancel">

          Cancelar

        </button>

        <button class="btn btn-danger"
                id="modalDelete"
                style="display:none;">

          Excluir

        </button>

        <button class="btn btn-primary"
                id="save-event">

          Salvar

        </button>

      </div>

    </div>

  </div>

  <!-- FIREBASE -->
  <script type="module">

    import {
      initializeApp
    } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

    import {
      getFirestore,
      doc,
      setDoc,
      getDoc
    } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

    /* 🔥 CONFIG FIREBASE */
    const firebaseConfig = {

      apiKey:  "AIzaSyDsNgzAtaHkYLQmYih7qqTPN6NvABd6dpM",

      authDomain: "calendario-icead-9e5d1.firebaseapp.com",

      projectId: "calendario-icead-9e5d1",

      storageBucket:
        "calendario-icead-9e5d1.firebasestorage.app",

      messagingSenderId:
        "72796581240"",

      appId:
        "1:72796581240:web:682f974ac7ea6ba84fec8d"

    };

    /* INICIAR FIREBASE */
    const app =
      initializeApp(firebaseConfig);

    const db =
      getFirestore(app);

    /* DISPONIBILIZA GLOBAL */
    window.db = db;

    window.doc = doc;

    window.setDoc = setDoc;

    window.getDoc = getDoc;

  </script>

  <!-- JS -->
  <script src="icead.js"></script>

</body>
</html>
